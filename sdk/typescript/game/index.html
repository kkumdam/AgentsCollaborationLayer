<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">점수</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">최고 점수</div>
          <div class="score-value" id="best-score">0</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="new-game-btn">새 게임</button>
      <p class="instructions">화살표 키 또는 WASD로 타일을 이동하세요</p>
    </div>
    <div class="grid" id="grid">
      <div class="grid-background">
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
      </div>
      <div class="tile-container" id="tile-container"></div>
    </div>
    <div id="game-message" class="game-message hidden">
      <p id="game-message-text"></p>
      <button id="retry-btn">다시 시도</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
